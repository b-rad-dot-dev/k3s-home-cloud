replicaCount: 1

image:
  repository: eclipse-mosquitto
  pullPolicy: IfNotPresent
  tag: "2.0.22"

auth:
  passwordFilePath: &passwordFilePath /mosquitto/config/passwordfile

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 1883

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

#livenessProbe:
#  httpGet:
#    path: /
#    port: http
#readinessProbe:
#  httpGet:
#    path: /
#    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

persistentVolume:
  enabled: true
  accessModes:
    - ReadWriteOnce
  annotations: {}
  size: 5Gi
  storageClass: nfs-csi

volumes:
  - name: data
    persistentVolumeClaim:
      claimName: mosquitto
  - name: config
    configMap:
      name: mosquitto-config
  - name: auth
    secret:
      secretName: mosquitto-auth

volumeMounts:
  - name: data
    mountPath: /mosquitto/data
  - name: config
    mountPath: /mosquitto/config/mosquitto.conf
    subPath: mosquitto.conf
  - name: auth
    mountPath: *passwordFilePath
    subPath: passwordfile

nodeSelector: {}

tolerations: []

affinity: {}
