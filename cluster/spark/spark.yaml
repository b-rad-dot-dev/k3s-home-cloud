# Applied manually
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: spark
  labels:
    kubernetes.io/service-name: spark
addressType: IPv4
ports:
  - port: 8000
    name: http0
  - port: 8001
    name: http1
  - port: 8002
    name: http2
  - port: 8003
    name: http3
  - port: 8004
    name: http4
  - port: 8005
    name: http5
endpoints:
  - addresses:
      - 10.0.97.155
---
apiVersion: v1
kind: Service
metadata:
  name: spark
spec:
  ports:
    - port: 80
      targetPort: 8000
      name: http
    - port: 8000
      targetPort: 8000
      name: http0
    - port: 8001
      targetPort: 8001
      name: http1
    - port: 8002
      targetPort: 8002
      name: http2
    - port: 8003
      targetPort: 8003
      name: http3
    - port: 8004
      targetPort: 8004
      name: http4
    - port: 8005
      targetPort: 8005
      name: http5
