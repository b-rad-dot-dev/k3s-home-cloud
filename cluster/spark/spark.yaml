# Applied manually
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: spark
  labels:
    kubernetes.io/service-name: spark
addressType: IPv4
ports:
  - port: 80
    name: http
  - port: 3000
    name: http3000
  - port: 8000
    name: http0
  - port: 8001
    name: http1
  - port: 8002
    name: http2
  - port: 8003
    name: http3
  - port: 8004
    name: http4
  - port: 8005
    name: http5
endpoints:
  - addresses:
      - 10.0.97.155
---
apiVersion: v1
kind: Service
metadata:
  name: spark
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 3000
      targetPort: 3000
      name: http3000
    - port: 8000
      targetPort: 8000
      name: http0
    - port: 8001
      targetPort: 8001
      name: http1
    - port: 8002
      targetPort: 8002
      name: http2
    - port: 8003
      targetPort: 8003
      name: http3
    - port: 8004
      targetPort: 8004
      name: http4
    - port: 8005
      targetPort: 8005
      name: http5
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/auth-url: https://login.b-rad.dev/authorize
  name: spark
spec:
  ingressClassName: nginx
  rules:
    - host: spark.b-rad.dev
      http:
        paths:
          - path: /model-config
            pathType: ImplementationSpecific
            backend:
              service:
                name: spark
                port:
                  number: 3000
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: spark
                port:
                  number: 80